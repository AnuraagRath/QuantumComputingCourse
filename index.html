<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Computing — Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  svg { width: 100vw; height: 100vh; }

  .link { stroke: #30363d; stroke-opacity: 0.7; stroke-width: 1.5px; }
  .link.lit { stroke: #58a6ff; stroke-opacity: 1; stroke-width: 2.5px; }

  .node circle { cursor: pointer; stroke-width: 2px; }
  .node text { font-size: 11px; fill: #c9d1d9; pointer-events: none; paint-order: stroke; stroke: #0d1117; stroke-width: 3px; }

  .Foundations circle { fill: #1f6feb; stroke: #58a6ff; }
  .Algorithms  circle { fill: #1a7f37; stroke: #3fb950; }
  .Protocols   circle { fill: #9e6a03; stroke: #e3b341; }
  .Qiskit      circle { fill: #6e40c9; stroke: #d2a8ff; }
  .root        circle { fill: #b91c1c; stroke: #f87171; }

  #tip {
    position: fixed; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #e6edf3;
    pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 9;
  }
  #legend {
    position: fixed; bottom: 16px; left: 16px; background: #161b22;
    border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px;
    font-size: 12px; color: #c9d1d9; z-index: 9;
  }
  #legend h4 { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .li { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  #search {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #21262d; border: 1px solid #30363d; color: #e6edf3;
    padding: 6px 16px; border-radius: 20px; font-size: 13px; width: 220px;
    outline: none; z-index: 9;
  }
  #search:focus { border-color: #58a6ff; }
  #title { position: fixed; top: 16px; left: 16px; z-index: 9; }
  #title h1 { font-size: 15px; font-weight: 600; color: #e6edf3; }
  #title p  { font-size: 11px; color: #8b949e; margin-top: 2px; }
</style>
</head>
<body>

<div id="title"><h1>⚛ Quantum Computing</h1><p>34 notes · interactive graph</p></div>
<input id="search" placeholder="Search notes…">
<div id="tip"></div>

<div id="legend">
  <h4>Sections</h4>
  <div class="li"><div class="dot" style="background:#58a6ff"></div>Foundations</div>
  <div class="li"><div class="dot" style="background:#3fb950"></div>Algorithms</div>
  <div class="li"><div class="dot" style="background:#e3b341"></div>Protocols</div>
  <div class="li"><div class="dot" style="background:#d2a8ff"></div>Qiskit</div>
  <div class="li"><div class="dot" style="background:#f87171"></div>MOC / Root</div>
</div>

<svg id="g">
  <defs>
    <marker id="arrow" viewBox="0 -4 8 8" refX="8" refY="0"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-4L8,0L0,4" fill="#30363d"/>
    </marker>
    <marker id="arrow-lit" viewBox="0 -4 8 8" refX="8" refY="0"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-4L8,0L0,4" fill="#58a6ff"/>
    </marker>
  </defs>
</svg>

<script>
const nodes = [
  {id:"QC MOC",                                   g:"root"},
  {id:"Quantum Computing and ML — Connections",   g:"root"},
  {id:"Quantum Complexity Theory",                g:"root"},
  {id:"The NISQ Era",                             g:"root"},
  {id:"Qubits and Superposition",                 g:"Foundations"},
  {id:"Quantum States and Dirac Notation",        g:"Foundations"},
  {id:"Quantum Gates",                            g:"Foundations"},
  {id:"Measurement and Collapse",                 g:"Foundations"},
  {id:"Entanglement",                             g:"Foundations"},
  {id:"Quantum Circuits",                         g:"Foundations"},
  {id:"Interference",                             g:"Foundations"},
  {id:"Phase Kickback",                           g:"Foundations"},
  {id:"Density Matrices and Mixed States",        g:"Foundations"},
  {id:"Quantum Noise and Decoherence",            g:"Foundations"},
  {id:"Quantum Error Correction",                 g:"Foundations"},
  {id:"Deutsch-Jozsa Algorithm",                  g:"Algorithms"},
  {id:"Bernstein-Vazirani Algorithm",             g:"Algorithms"},
  {id:"Simon's Algorithm",                        g:"Algorithms"},
  {id:"Grover's Algorithm",                       g:"Algorithms"},
  {id:"Quantum Fourier Transform",                g:"Algorithms"},
  {id:"Quantum Phase Estimation",                 g:"Algorithms"},
  {id:"Shor's Algorithm",                         g:"Algorithms"},
  {id:"HHL Algorithm",                            g:"Algorithms"},
  {id:"Quantum Simulation",                       g:"Algorithms"},
  {id:"Variational Quantum Eigensolver",          g:"Algorithms"},
  {id:"Quantum Approximate Optimization Algorithm",g:"Algorithms"},
  {id:"Quantum Teleportation",                    g:"Protocols"},
  {id:"Superdense Coding",                        g:"Protocols"},
  {id:"BB84 Quantum Key Distribution",            g:"Protocols"},
  {id:"Qiskit MOC",                               g:"Qiskit"},
  {id:"Qiskit Basics — Circuits and Gates",       g:"Qiskit"},
  {id:"Qiskit Simulators",                        g:"Qiskit"},
  {id:"Running on Real Hardware",                 g:"Qiskit"},
  {id:"Qiskit — Implementing the Algorithms",     g:"Qiskit"},
];

const rawEdges = [
  ["QC MOC","Qubits and Superposition"],
  ["QC MOC","Quantum States and Dirac Notation"],
  ["QC MOC","Quantum Gates"],
  ["QC MOC","Measurement and Collapse"],
  ["QC MOC","Entanglement"],
  ["QC MOC","Quantum Circuits"],
  ["QC MOC","Interference"],
  ["QC MOC","Phase Kickback"],
  ["QC MOC","Density Matrices and Mixed States"],
  ["QC MOC","Quantum Noise and Decoherence"],
  ["QC MOC","Quantum Error Correction"],
  ["QC MOC","Deutsch-Jozsa Algorithm"],
  ["QC MOC","Bernstein-Vazirani Algorithm"],
  ["QC MOC","Simon's Algorithm"],
  ["QC MOC","Grover's Algorithm"],
  ["QC MOC","Quantum Fourier Transform"],
  ["QC MOC","Quantum Phase Estimation"],
  ["QC MOC","Shor's Algorithm"],
  ["QC MOC","HHL Algorithm"],
  ["QC MOC","Quantum Simulation"],
  ["QC MOC","Variational Quantum Eigensolver"],
  ["QC MOC","Quantum Approximate Optimization Algorithm"],
  ["QC MOC","Quantum Teleportation"],
  ["QC MOC","Superdense Coding"],
  ["QC MOC","BB84 Quantum Key Distribution"],
  ["QC MOC","Qiskit Basics — Circuits and Gates"],
  ["QC MOC","Qiskit Simulators"],
  ["QC MOC","Running on Real Hardware"],
  ["QC MOC","Qiskit — Implementing the Algorithms"],
  ["QC MOC","Quantum Computing and ML — Connections"],
  ["Qubits and Superposition","Quantum States and Dirac Notation"],
  ["Quantum States and Dirac Notation","Quantum Gates"],
  ["Quantum States and Dirac Notation","Interference"],
  ["Quantum Gates","Measurement and Collapse"],
  ["Quantum Gates","Deutsch-Jozsa Algorithm"],
  ["Measurement and Collapse","Entanglement"],
  ["Measurement and Collapse","Interference"],
  ["Measurement and Collapse","Quantum Noise and Decoherence"],
  ["Entanglement","Quantum Circuits"],
  ["Entanglement","Interference"],
  ["Entanglement","Quantum Error Correction"],
  ["Entanglement","Quantum Teleportation"],
  ["Quantum Circuits","Interference"],
  ["Quantum Circuits","Quantum Noise and Decoherence"],
  ["Interference","Phase Kickback"],
  ["Interference","Deutsch-Jozsa Algorithm"],
  ["Interference","Grover's Algorithm"],
  ["Interference","Quantum Fourier Transform"],
  ["Phase Kickback","Deutsch-Jozsa Algorithm"],
  ["Density Matrices and Mixed States","Measurement and Collapse"],
  ["Density Matrices and Mixed States","Quantum Noise and Decoherence"],
  ["Density Matrices and Mixed States","Variational Quantum Eigensolver"],
  ["Quantum Noise and Decoherence","Quantum Error Correction"],
  ["Quantum Noise and Decoherence","Variational Quantum Eigensolver"],
  ["Quantum Noise and Decoherence","Quantum Approximate Optimization Algorithm"],
  ["Deutsch-Jozsa Algorithm","Bernstein-Vazirani Algorithm"],
  ["Bernstein-Vazirani Algorithm","Simon's Algorithm"],
  ["Simon's Algorithm","Grover's Algorithm"],
  ["Simon's Algorithm","Shor's Algorithm"],
  ["Simon's Algorithm","Quantum Fourier Transform"],
  ["Grover's Algorithm","Quantum Fourier Transform"],
  ["Quantum Fourier Transform","Quantum Phase Estimation"],
  ["Quantum Fourier Transform","Shor's Algorithm"],
  ["Quantum Phase Estimation","Shor's Algorithm"],
  ["Quantum Phase Estimation","HHL Algorithm"],
  ["Quantum Phase Estimation","Quantum Simulation"],
  ["Shor's Algorithm","Variational Quantum Eigensolver"],
  ["Variational Quantum Eigensolver","Quantum Approximate Optimization Algorithm"],
  ["Quantum Simulation","Variational Quantum Eigensolver"],
  ["Quantum Teleportation","Superdense Coding"],
  ["Superdense Coding","BB84 Quantum Key Distribution"],
  ["Qiskit MOC","Qiskit Basics — Circuits and Gates"],
  ["Qiskit MOC","Qiskit Simulators"],
  ["Qiskit MOC","Running on Real Hardware"],
  ["Qiskit MOC","Qiskit — Implementing the Algorithms"],
  ["Qiskit Basics — Circuits and Gates","Quantum Gates"],
  ["Qiskit Basics — Circuits and Gates","Qiskit Simulators"],
  ["Qiskit Simulators","Running on Real Hardware"],
  ["Qiskit — Implementing the Algorithms","Deutsch-Jozsa Algorithm"],
  ["Qiskit — Implementing the Algorithms","Grover's Algorithm"],
  ["Qiskit — Implementing the Algorithms","Quantum Fourier Transform"],
  ["Qiskit — Implementing the Algorithms","Quantum Phase Estimation"],
  ["Qiskit — Implementing the Algorithms","Variational Quantum Eigensolver"],
  ["Qiskit — Implementing the Algorithms","Quantum Approximate Optimization Algorithm"],
  ["Quantum Complexity Theory","Qubits and Superposition"],
  ["Quantum Complexity Theory","HHL Algorithm"],
  ["The NISQ Era","Variational Quantum Eigensolver"],
  ["The NISQ Era","Quantum Approximate Optimization Algorithm"],
  ["Quantum Computing and ML — Connections","Quantum Fourier Transform"],
  ["Quantum Computing and ML — Connections","Variational Quantum Eigensolver"],
  ["Quantum Computing and ML — Connections","Grover's Algorithm"],
];

// Build lookup and degree map
const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
const deg  = Object.fromEntries(nodes.map(n => [n.id, 0]));
rawEdges.forEach(([s,t]) => { deg[s]++; deg[t]++; });

const rScale = d3.scaleSqrt().domain([0, d3.max(Object.values(deg))]).range([6, 20]);

// Build proper link objects referencing node objects
const links = rawEdges.map(([s,t]) => ({ source: byId[s], target: byId[t] }));

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#g");
const container = svg.append("g");

// ── Simulation ────────────────────────────────────────────────────────────────
const sim = d3.forceSimulation(nodes)
  .force("link",    d3.forceLink(links).id(d => d.id)
    .distance(d => (d.source.id === "QC MOC" || d.target.id === "QC MOC") ? 200 : 110)
    .strength(0.25))
  .force("charge",  d3.forceManyBody().strength(-900).distanceMax(600))
  .force("center",  d3.forceCenter(W/2, H/2).strength(0.04))
  .force("collide", d3.forceCollide().radius(d => rScale(deg[d.id]) + 28).strength(1).iterations(3))
  .force("x", d3.forceX(W/2).strength(0.03))
  .force("y", d3.forceY(H/2).strength(0.03))
  .alphaDecay(0.015);

// ── Links ─────────────────────────────────────────────────────────────────────
const linkSel = container.append("g")
  .selectAll("line")
  .data(links)
  .join("line")
    .attr("class", "link")
    .attr("marker-end", "url(#arrow)");

// ── Nodes ─────────────────────────────────────────────────────────────────────
const nodeSel = container.append("g")
  .selectAll("g")
  .data(nodes)
  .join("g")
    .attr("class", d => `node ${d.g}`)
    .call(d3.drag()
      .on("start", (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on("end",   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

nodeSel.append("circle").attr("r", d => rScale(deg[d.id]));

nodeSel.append("text")
  .attr("dy", d => rScale(deg[d.id]) + 15)
  .attr("text-anchor", "middle")
  .style("font-size", d => d.g === "root" ? "12px" : "10px")
  .text(d => d.id.length > 26 ? d.id.slice(0,24)+"…" : d.id);

// ── Tooltip & highlight ───────────────────────────────────────────────────────
const tip = document.getElementById("tip");

nodeSel
  .on("mouseover", (e, d) => {
    tip.style.opacity = 1;
    tip.innerHTML = `<strong>${d.id}</strong><br><span style="color:#8b949e">${d.g} · ${deg[d.id]} connections</span>`;
    linkSel
      .classed("lit", l => l.source.id===d.id || l.target.id===d.id)
      .attr("marker-end", l =>
        (l.source.id===d.id || l.target.id===d.id) ? "url(#arrow-lit)" : "url(#arrow)");
  })
  .on("mousemove", e => { tip.style.left = e.clientX+14+"px"; tip.style.top = e.clientY-10+"px"; })
  .on("mouseout",  () => {
    tip.style.opacity = 0;
    linkSel.classed("lit", false).attr("marker-end","url(#arrow)");
  })
  .on("click", (_, d) => {
    const folder = {Foundations:"Foundations",Algorithms:"Algorithms",Protocols:"Protocols",Qiskit:"Qiskit",root:""}[d.g];
    const path = folder ? `${folder}/${d.id}.md` : `${d.id}.md`;
    window.open(`https://github.com/AnuraagRath/QuantumComputingCourse/blob/main/${path.split('/').map(encodeURIComponent).join('/')}`, "_blank");
  });

// ── Tick ──────────────────────────────────────────────────────────────────────
sim.on("tick", () => {
  linkSel
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      // shorten line so arrow tip sits on circle edge, not inside it
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const r = rScale(deg[d.target.id]) + 2;
      return d.target.x - (dx/dist)*r;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const r = rScale(deg[d.target.id]) + 2;
      return d.target.y - (dy/dist)*r;
    });

  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── Zoom ──────────────────────────────────────────────────────────────────────
svg.call(d3.zoom().scaleExtent([0.15, 5]).on("zoom", e => container.attr("transform", e.transform)));

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  nodeSel.select("circle").style("opacity", d => !q || d.id.toLowerCase().includes(q) ? 1 : 0.1);
  nodeSel.select("text").style("opacity",   d => !q || d.id.toLowerCase().includes(q) ? 1 : 0.1);
  linkSel.style("opacity", !q ? 0.7 : 0.05);
});
</script>
</body>
</html>
